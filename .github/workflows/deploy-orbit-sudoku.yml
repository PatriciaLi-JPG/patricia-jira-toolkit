name: Deploy Orbit Sudoku

on:
  push:
    branches:
      - master
    paths:
      - "examples/orbit-sudoku/**"
      - ".github/workflows/deploy-orbit-sudoku.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: orbit-sudoku-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/orbit-sudoku
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/orbit-sudoku/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/orbit-sudoku/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
